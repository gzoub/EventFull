<!doctype html>
<html lang="el">
<head>
    <meta charset="utf-8">
    <title>Dashboard - EventFull</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>EventFull - Διαχείριση</h1>
        <nav>
            <a href="dashboard.html">Αρχική</a> | 
            <a href="search.html">Αναζήτηση</a> | 
            <a href="index.html">Αποσύνδεση</a>
        </nav>
    </header>

    <main class="dashboard-container wide" >
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Οι Εκδηλώσεις μου</h2>
            <a href="#" class="btn-new-event">+ Νέα Εκδήλωση</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Τίτλος</th>
                    <th>Ημερομηνία</th>
                    <th>Τοποθεσία</th>
                    <th>Κατάσταση</th>
                    <th>Ενέργειες</th> </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Rock Summer Festival</td>
                    <td>15/07/2026</td>
                    <td>Τεχνόπολη, Αθήνα</td>
                    <td><span class="status active">Ενεργή</span></td>
                    <td><a href="#" class="btn-edit">Επεξεργασία</a></td>
                </tr>
               
            </tbody>
        </table>
    </main>

</html>
